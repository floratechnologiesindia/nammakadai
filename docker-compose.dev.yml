version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: stationery-mongo-dev
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data_dev:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: stationery-backend-dev
    restart: unless-stopped
    environment:
      - MONGODB_URI=mongodb://mongo:27017/stationery_showcase
      - JWT_SECRET=devsecret
      - CLIENT_ORIGINS=http://localhost:3000,http://localhost:5173
    ports:
      - "5003:5003"
    depends_on:
      - mongo
    volumes:
      - ./backend:/app
      - /app/node_modules

  storefront:
    build:
      context: ./storefront
      dockerfile: Dockerfile.dev
    container_name: stationery-storefront-dev
    restart: unless-stopped
    environment:
      # Use Docker service name from inside the container
      - NEXT_PUBLIC_API_BASE_URL=http://backend:4000
    ports:
      - "5001:5001"
    depends_on:
      - backend
    volumes:
      - ./storefront:/app
      - /app/node_modules

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile.dev
    container_name: stationery-admin-dev
    restart: unless-stopped
    environment:
      - VITE_API_BASE_URL=http://localhost:4000
    ports:
      - "5002:5002"
    depends_on:
      - backend
    volumes:
      - ./admin:/app
      - /app/node_modules

volumes:
  mongo_data_dev:

